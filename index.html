<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pega Webcam Capture POC</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 20px; background: #f5f5f5; }
        video { width: 100%; max-width: 400px; border-radius: 8px; border: 2px solid #ccc; background: black; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #004085; }
        #status { font-weight: bold; color: green; margin-top: 10px; }
    </style>
</head>
<body>

    <h3>📷 Case Webcam Capture POC</h3>
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="capture">Capture Frame</button>
    <div id="status">Status: Camera streaming...</div>

    <script>
        captureButton.addEventListener('click', () => {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const base64Image = canvas.toDataURL('image/jpeg');

    // FIX FOR NEXT-TAB DEMO:
    // Look backward at the original Pega tab that opened this camera window
    try {
        if (window.opener && !window.opener.closed) {
            // Find the text field inside the main Pega tab
            const pegaInputField = window.opener.document.querySelector('input[data-test-id="photo-string-input"]');
            
            if (pegaInputField) {
                pegaInputField.value = base64Image;
                
                // Trigger the input event so Pega registers the change
                pegaInputField.dispatchEvent(new Event('input', { bubbles: true }));
                
                statusDiv.innerText = "✓ Photo sent back to the Pega Tab! You can close this tab.";
                statusDiv.style.color = "blue";
            } else {
                statusDiv.innerText = "Error: Text field not found in Pega tab.";
                statusDiv.style.color = "red";
            }
        } else {
            statusDiv.innerText = "Error: Original Pega tab was closed.";
            statusDiv.style.color = "red";
        }
    } catch(e) {
        statusDiv.innerText = "Security block: Tabs must be on the same domain or allowed.";
        statusDiv.style.color = "red";
        console.error(e);
    }
});

    </script>
</body>
</html>
