<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pega Webcam Capture POC</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 20px; background: #f5f5f5; }
        video { width: 100%; max-width: 400px; border-radius: 8px; border: 2px solid #ccc; background: black; }
        button { padding: 12px 24px; font-size: 16px; margin: 10px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #004085; }
        #status { font-weight: bold; color: green; margin-top: 10px; }
    </style>
</head>
<body>

    <h3>📷 Case Webcam Capture POC</h3>
    <video id="video" autoplay playsinline></video>
    <br>
    <button id="capture">Capture Frame</button>
    <div id="status">Status: Initializing camera...</div>

    <script>
        const video = document.getElementById('video');
        const captureButton = document.getElementById('capture');
        const statusDiv = document.getElementById('status');

        // 1. Safely request browser webcam stream
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
                .then(stream => {
                    video.srcObject = stream;
                    statusDiv.innerText = "Status: Camera streaming ready.";
                    statusDiv.style.color = "green";
                })
                .catch(err => {
                    statusDiv.innerText = "Error: Camera permission denied or device not found.";
                    statusDiv.style.color = "red";
                    console.error(err);
                });
        } else {
            statusDiv.innerText = "Error: Browser does not support media capture.";
            statusDiv.style.color = "red";
        }

        // 2. Capture frame and broadcast safely to the opener window
        captureButton.addEventListener('click', () => {
            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Compress frame to a clean Base64 JPEG string
                const base64Image = canvas.toDataURL('image/jpeg', 0.7);

                // 3. SECURE CROSS-DOMAIN HANDOFF: Send data back to the Pega tab
                if (window.opener) {
                    window.opener.postMessage({
                        type: "WEBCAM_CAPTURE",
                        imageData: base64Image
                    }, "*"); // "*" allows the message to cross domain boundaries safely for a POC
                    
                    statusDiv.innerText = "✓ Photo sent back to Pega! Closing window in 2 seconds...";
                    statusDiv.style.color = "blue";
                    
                    // Automatically close the tab after 2 seconds to look professional
                    setTimeout(() => { window.close(); }, 2000);
                } else {
                    statusDiv.innerText = "Error: Could not find original Pega tab connection.";
                    statusDiv.style.color = "red";
                }
            } catch(e) {
                statusDiv.innerText = "Execution error during capture.";
                statusDiv.style.color = "red";
                console.error(e);
            }
        });
    </script>
</body>
</html>
